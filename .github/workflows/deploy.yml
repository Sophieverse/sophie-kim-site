name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 65002 -T 10 -H us-phx-web774.main-hosting.eu >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            --exclude='.git' \
            --exclude='.github' \
            ./ u978264430@us-phx-web774.main-hosting.eu:public_html/
